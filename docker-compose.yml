services:
  backend:
    build:
      context: ./Gonny_Backend
    container_name: gonny-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./Gonny_Backend:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: gonny-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gonny-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
